alloy:
  mounts:
    varlog: true
    dockercontainers: false

  extraPorts:
    - name: syslog-tcp
      port: 5514
      targetPort: 5514
      protocol: TCP
    # SRL nodes cannot complete a TCP handshake out of their srbase-mgmt
    # netns because the SYN-ACK never reaches the originating socket in
    # the VRF namespace. UDP avoids the issue (no return packet needed).
    - name: syslog-udp
      port: 5514
      targetPort: 5514
      protocol: UDP

  resources:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      memory: 256Mi

  configMap:
    create: true
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          action        = "replace"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/*.log"
        }
      }

      local.file_match "pod_logs" {
        path_targets = discovery.relabel.pod_logs.output
      }

      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.write.default.receiver]
      }

      loki.source.syslog "node_syslog" {
        // FRR uses TCP (works); SRL uses UDP (only path that survives
        // clabernetes' nested-netns return-path gap for outbound traffic
        // initiated from a network-instance VRF).
        listener {
          address               = "0.0.0.0:5514"
          protocol              = "tcp"
          labels                = {
            source_type = "syslog",
            namespace   = "clabernetes",
          }
          label_structured_data = true
        }
        listener {
          address               = "0.0.0.0:5514"
          protocol              = "udp"
          labels                = {
            source_type = "syslog",
            namespace   = "clabernetes",
          }
          label_structured_data = true
        }
        // loki.source.syslog only attaches the __syslog_* labels that
        // appear in its relabel_rules argument. A downstream loki.relabel
        // would receive entries with those labels already stripped, so
        // the rules must live here.
        relabel_rules = loki.relabel.syslog.rules
        forward_to    = [loki.write.default.receiver]
      }

      // Owned only for its `.rules` export; the receiver/forward_to are
      // unused but required by the schema.
      loki.relabel "syslog" {
        forward_to = [loki.write.default.receiver]
        rule {
          source_labels = ["__syslog_message_hostname"]
          target_label  = "host"
        }
        rule {
          source_labels = ["__syslog_message_app_name"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__syslog_message_severity"]
          target_label  = "severity"
        }
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }

controller:
  type: daemonset

serviceMonitor:
  enabled: true
