defaultRules:
  create: true
  rules:
    kubeControllerManager: false
    kubeProxy: false
    kubeScheduler: false
    kubeEtcd: false

# k3s/k3d disables these so the upstream rules cause spurious alerts otherwise.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 6h
    retentionSize: ""
    scrapeInterval: 30s
    evaluationInterval: 10s
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1536Mi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        memory: 128Mi

grafana:
  enabled: true
  replicas: 1
  defaultDashboardsEnabled: true
  adminPassword: admin
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
    hosts:
      - grafana.127-0-0-1.nip.io
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.127-0-0-1.nip.io
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    # 384Mi OOM-killed (exit 137) the grafana container under sustained load on
    # the heavier dashboards (the geomap especially) — its many panels keep the
    # backend's query/render working set above that. 768Mi clears it with room
    # to spare; the node has ample headroom (see runbook: "Grafana OOMKilled").
    limits:
      memory: 768Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      # Each dashboard ConfigMap can set this annotation to route the
      # dashboard into a Grafana folder. Created on first sync.
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: ALL
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      isDefault: false

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

prometheusOperator:
  resources:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      memory: 256Mi
