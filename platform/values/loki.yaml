deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 24h
    allow_structured_metadata: true
  pattern_ingester:
    enabled: false
  ruler:
    enable_api: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  affinity: {}

# Disable distributed components (we use SingleBinary)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Caches off for single-binary
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Don't deploy minio; we use filesystem storage
minio:
  enabled: false

# Gateway is the consumer-facing nginx in front of Loki
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi

test:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
  serviceMonitor:
    enabled: true
