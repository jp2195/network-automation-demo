# 15 links. Endpoints are { node, intf } where intf is the SR Linux nominal name
# (ethernet-1/N) for srlinux nodes and the Linux netdev name (ethN) for frr nodes.
# subnet_v4 is a /30; .1 sits on side a, .2 on side b.
# kind is "backbone" (SRL↔SRL, runs IS-IS + SR) or "cabinet" (SRL↔FRR, runs eBGP).
links:
  # --- I-285 perimeter ring (6 backbone links) ---
  - id: ring-n-e
    kind: backbone
    a: { node: hub-n, intf: ethernet-1/1 }
    b: { node: hub-e, intf: ethernet-1/2 }
    subnet_v4: 10.1.1.0/30
    cable:
      label: FOC-RING-NE
      corridor: I-285
      route_description: "I-285 NB MM 30-37"
      length_km: 14.2
      installed: 2022-09-14
      provider: apex-fiber
      circuit_id: APX-RING-NE-001
      restoration_sla_hours: 4

  - id: ring-e-i20e
    kind: backbone
    a: { node: hub-e, intf: ethernet-1/1 }
    b: { node: hub-i20e, intf: ethernet-1/2 }
    subnet_v4: 10.1.2.0/30
    cable:
      label: FOC-RING-EI20E
