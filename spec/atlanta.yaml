# Atlas DOT (ADOT) — Region 7 Atlanta Metro
# District-rich tier: 12 nodes (2 TMC + 6 corridor hubs as SR Linux + 4 FRR field cabinets).
# This file is the canonical input to tools/render. Every IP, prefix-SID, link, and tenant
# in the demo traces back to this spec.

metadata:
  name: atlanta
  description: Atlas DOT Region 7 Atlanta Metro — District-rich tier (12 nodes)
  isis:
    area: "49.0001"
    level: L2
  asn:
    backbone: 65000
  ipam:
    loopback_v4: 10.0.0.0/24
    backbone_v4: 10.1.0.0/16
    cabinet_v4:  10.2.0.0/16

dot:
  slug: adot
  name: Atlas DOT
  region: Region 7 Atlanta Metro
  on_call:
    primary: "Region 7 NMS — pager A"
    secondary: "ADOT NOC — pager B"

# Agencies / tenants riding the network. Slugs are stable identifiers used by
# nodes.agencies[] and end up as NetBox tenants.
agencies:
  - slug: adot-region-7
    name: Atlas DOT Region 7 Operations
  - slug: capitol-metro-public-works
    name: Capitol Metro Public Works
  - slug: northridge-transportation-authority
    name: Northridge Transportation Authority
  - slug: eastfield-county-dot
    name: Eastfield County DOT
  - slug: lakeside-county-dot
    name: Lakeside County DOT
  - slug: pinecrest-public-works
    name: Pinecrest Public Works
  - slug: westridge-county-authority
    name: Westridge County Authority
  - slug: southfield-highway-department
    name: Southfield Highway Department
  - slug: sandstone-municipal-works
    name: Sandstone Municipal Works
  - slug: metro-transit-operations
    name: Metro Transit Operations (MTO)
  - slug: state-highway-patrol
    name: State Highway Patrol

# Fiber providers. Slugs end up on NetBox cable custom fields.
providers:
  - slug: apex-fiber
    name: Apex Fiber Networks
  - slug: cascade-telecom
    name: Cascade Telecom Group
  - slug: adot-owned
    name: ADOT-owned fiber

# 12 nodes. Order is meaningful: defines deterministic interface and IP allocation,
# and is the order in which devices appear in the NetBox seed.
nodes:
  # --- TMCs ---
  - name: tmc-1
    kind: srlinux
    role: tmc
    description: Primary TMC head end
    site:
      label: forest-park
      city: Forest Park
      lat: 33.6195
      lon: -84.3705
      district: 7
    loopback_v4: 10.0.0.1
    isis_sid: 16001

  - name: tmc-2
    kind: srlinux
    role: tmc
    description: Backup TMC head end (active-active via iBGP)
    site:
      label: buckhead
      city: Buckhead
      lat: 33.8484
      lon: -84.3781
      district: 7
    loopback_v4: 10.0.0.2
    isis_sid: 16002

  # --- Corridor hubs ---
