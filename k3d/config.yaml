apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: atlas-demo
servers: 1
agents: 2
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer
registries:
  create:
    name: atlas-demo-registry
    host: "0.0.0.0"
    hostPort: "5001"
options:
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
  k3s:
    extraArgs:
      - arg: --disable=helm-controller
        nodeFilters:
          - server:*
