apiVersion: batch/v1
kind: Job
metadata:
  name: netbox-seed
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbox-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: python:3.12-slim
          command: ["python3", "/scripts/seed.py"]
          env:
            - name: NETBOX_URL
              value: "http://netbox.netbox.svc.cluster.local"
            - name: NETBOX_TOKEN
              # demo token; mirrors superuser.apiToken in workloads/netbox/chart-values.yaml
              value: "0123456789abcdef0123456789abcdef01234567"
            - name: SEED_FILE
              value: /seed/seed.json
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: seed-data
              mountPath: /seed
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: seed-data
          configMap:
            name: netbox-seed-data
        - name: scripts
          configMap:
            name: netbox-seed-script
