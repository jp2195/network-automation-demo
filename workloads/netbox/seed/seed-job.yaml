apiVersion: batch/v1
kind: Job
metadata:
  name: netbox-seed
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbox-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: python:3.12-slim
          command: ["python3", "/scripts/seed.py"]
          env:
            - name: NETBOX_URL
              value: "http://netbox.netbox.svc.cluster.local"
            # NetBox 4.x stores API tokens hashed (key column is varchar(12)
            # for a preview only), so we can't pin one via env. Mint a fresh
            # token each run via /api/users/tokens/provision/ using the
            # superuser credentials the chart already manages.
            - name: NETBOX_USERNAME
              valueFrom:
                secretKeyRef:
                  name: netbox-superuser
                  key: username
            - name: NETBOX_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: netbox-superuser
                  key: password
            - name: SEED_FILE
              value: /seed/seed.json
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: seed-data
              mountPath: /seed
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: seed-data
          configMap:
            name: netbox-seed-data
        - name: scripts
          configMap:
            name: netbox-seed-script
