superuser:
  name: admin
  email: admin@atlas-demo.local
  password: admin

# netbox-chart 8.2.9 only injects SUPERUSER_NAME and SUPERUSER_EMAIL into
# the pod env, so the bootstrap admin lands without the password from
# values. Inject it so the seed Job's `tokens/provision/` call succeeds.
# (We deliberately do NOT inject SUPERUSER_API_TOKEN: NetBox 4.x stores
# tokens hashed and the legacy `key` column is varchar(12), which crashes
# any startup script that tries to insert the 40-char demo token.)
extraEnvs:
  - name: SUPERUSER_PASSWORD
    valueFrom:
      secretKeyRef:
        name: netbox-superuser
        key: password

secretKey: atlas-demo-not-secret-but-50-plus-chars-long-padding-yes

allowedHosts:
  - "*"

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 2Gi

persistence:
  enabled: true
  size: 1Gi

worker:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

postgresql:
  enabled: false

externalDatabase:
  host: netbox-postgres-rw
  port: 5432
  username: netbox
  database: netbox
  existingSecretName: netbox-postgres-app
  existingSecretKey: password

valkey:
  enabled: false

tasksDatabase:
  host: valkey.valkey.svc.cluster.local
  port: 6379
  database: 0
  ssl: false
  username: ""
  password: ""

cachingDatabase:
  host: valkey.valkey.svc.cluster.local
  port: 6379
  database: 1
  ssl: false
  username: ""
  password: ""

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-cluster-issuer
  hosts:
    - host: netbox.127-0-0-1.nip.io
      paths:
        - /
  tls:
    - secretName: netbox-tls
      hosts:
        - netbox.127-0-0-1.nip.io

metrics:
  enabled: false

housekeeping:
  enabled: true
