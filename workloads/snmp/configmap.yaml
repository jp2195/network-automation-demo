apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-config
data:
  snmp.yml: |
    # Minimal snmp_exporter config for the demo. One auth (v2c, community
    # `demo-public`, matching the FRR cabinets' snmpd.conf), one module
    # walking the standard IF-MIB tables.
    auths:
      demo_v2c:
        community: demo-public
        security_level: noAuthNoPriv
        auth_protocol: MD5
        priv_protocol: DES
        version: 2

    modules:
      if_mib:
        walk:
          - sysUpTime
          - interfaces
          - ifXTable
        lookups:
          - source_indexes: [ifIndex]
            lookup: ifName
            drop_source_indexes: false
        overrides:
          ifType:
            type: EnumAsInfo
