apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  labels:
    app.kubernetes.io/name: snmp-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snmp-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snmp-exporter
    spec:
      containers:
        - name: snmp-exporter
          image: prom/snmp-exporter:v0.27.0
          args:
            - --config.file=/etc/snmp_exporter/snmp.yml
          ports:
            - name: http
              containerPort: 9116
              protocol: TCP
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/snmp_exporter
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: snmp-exporter-config
