apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: snmp-frr-cabinets
  labels:
    release: kps
spec:
  jobName: snmp-frr-cabinets
  interval: 30s
  scrapeTimeout: 25s
  module: if_mib
  prober:
    url: snmp-exporter.monitoring.svc.cluster.local:9116
    path: /snmp
  targets:
    staticConfig:
      # Targets the standard SNMP port (161/udp). The FRR cabinet container
      # has CAP_NET_ADMIN + CAP_SYS_ADMIN granted via the topology kind
      # config, so snmpd-as-root binds 161 fine; clabernetes auto-publishes
      # 161 on the per-node Service. (Earlier versions used 1161 to dodge a
      # privileged-port issue that turned out to be unrelated.)
      static:
        - atlanta-fc-n.clabernetes.svc.cluster.local:161
        - atlanta-fc-nw.clabernetes.svc.cluster.local:161
        - atlanta-fc-i20e.clabernetes.svc.cluster.local:161
        - atlanta-fc-sw.clabernetes.svc.cluster.local:161
      labels:
        telemetry_source: snmp
        node_role: field-cabinet
      relabelingConfigs:
        # The Probe CR's static targets become the `instance` label by
        # default; promote the bare hostname to a `node` label so it
        # joins cleanly with link_membership_info{node=...}.
        - sourceLabels: [__param_target]
          regex: "atlanta-(fc-[a-z0-9]+)\\.clabernetes\\.svc\\.cluster\\.local:[0-9]+"
          targetLabel: node
          replacement: "$1"
        # snmp_exporter v0.27 requires an explicit auth selector. Use the
        # `public_v2` auth bundled in the upstream snmp.yml (community = public).
        - targetLabel: __param_auth
          replacement: public_v2
