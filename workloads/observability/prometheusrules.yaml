apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: srl-interface-alerts
  labels:
    app.kubernetes.io/name: srl-interface-alerts
    release: kps
spec:
  groups:
    - name: srl-interface
      interval: 30s
      rules:
        # Only alert on interfaces that are administratively enabled — every
        # IXR-D3 ships with 56 ethernet ports and the unused ones report
        # oper-state=down by default. Joining against admin_state=1 keeps the
        # alert firing only for links the operator actually expects up.
        - alert: SRLInterfaceOperDown
          expr: |
            srl_nokia_interfaces_interface_oper_state == 2
              and on(node, interface)
            srl_nokia_interfaces_interface_admin_state == 1
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "SRL interface {{ $labels.interface }} on {{ $labels.node }} is DOWN"
            description: |
              Interface {{ $labels.interface }} on device {{ $labels.node }} is reporting
              oper-state=down. Site: {{ $labels.site }} ({{ $labels.city }}). Role: {{ $labels.role }}.

        - alert: SRLInterfaceFlapping
          expr: |
            changes(srl_nokia_interfaces_interface_oper_state[5m]) > 4
              and on(node, interface)
            srl_nokia_interfaces_interface_admin_state == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "SRL interface {{ $labels.interface }} on {{ $labels.node }} is flapping"
            description: |
              Interface {{ $labels.interface }} on device {{ $labels.node }} has changed
              oper-state more than 4 times in the last 5 minutes.
