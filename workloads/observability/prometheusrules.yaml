apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: srl-interface-alerts
  labels:
    app.kubernetes.io/name: srl-interface-alerts
    release: kps
spec:
  groups:
    - name: srl-interface
      interval: 30s
      rules:
        # Only alert on interfaces that are part of the rendered topology
        # (configured links, captured by link_membership_info). An IXR-D3
        # exposes 56 ethernet ports; the unused ones report oper-state=down
        # by default but no link_membership_info exists for them, so they're
        # filtered out. Joining on link_membership_info also lifts link_id /
        # link_kind into the alert labels for downstream enrichment.
        - alert: SRLInterfaceOperDown
          expr: |
            (srl_nokia_interfaces_interface_oper_state == 2)
              * on(node, interface) group_left(link_id, link_kind, site, city, role, corridor)
            link_membership_info
          for: 0s
          labels:
            severity: critical
          annotations:
            summary: "SRL interface {{ $labels.interface }} on {{ $labels.node }} is DOWN"
            description: |
              Interface {{ $labels.interface }} on device {{ $labels.node }} is reporting
              oper-state=down. Link: {{ $labels.link_id }} ({{ $labels.link_kind }}). Site:
              {{ $labels.site }} ({{ $labels.city }}). Role: {{ $labels.role }}.

        - alert: SRLInterfaceFlapping
          expr: |
            (changes(srl_nokia_interfaces_interface_oper_state[5m]) > 4)
              * on(node, interface) group_left(link_id, link_kind, corridor)
            link_membership_info
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "SRL interface {{ $labels.interface }} on {{ $labels.node }} is flapping"
            description: |
              Interface {{ $labels.interface }} on device {{ $labels.node }} has changed
              oper-state more than 4 times in the last 5 minutes. Link: {{ $labels.link_id }}.
