apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - prometheusrules.yaml
  - link-membership.yaml
  - link-rate-rules.yaml
  - alertmanagerconfig.yaml
  - gray-failure-rules.yaml
  - alloy-syslog-svc.yaml
  - rbac-incident-dashboards.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: grafana-dashboards-network
    files:
      - dashboards/network-overview.json
      - dashboards/geomap.json
      - dashboards/device-detail.json
      - dashboards/cabinet-detail.json
      - dashboards/link-detail.json
      - dashboards/corridor-status.json
      - dashboards/topology-graph.json
      - dashboards/routing-protocols.json
      - dashboards/hardware-health.json
      - dashboards/capacity-planning.json
      - dashboards/route-flaps.json
      - dashboards/audit-feed.json
      - dashboards/alert-console.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Atlas Demo
  # Upstream Argo Workflows controller dashboard (adapted for v4 metric names
  # + our prometheus datasource). Kept out of dashboards/ so the renderer's
  # cross-nav rewrite never touches it; lands in its own "Argo" folder.
  - name: grafana-dashboards-argo
    files:
      - prebuilt/argo-workflows.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Argo
