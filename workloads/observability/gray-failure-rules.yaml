apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gray-failure-rules
  labels:
    release: kps
spec:
  groups:
    - name: gray-failure.alerts
      rules:
        - alert: SRLOpticalDegrading
          expr: |
            (dom_rx_power_dbm < -12) * on(node, interface)
              group_left(link_id, link_kind) link_membership_info
          for: 2m
          labels:
            severity: warning
            lane: dom
          annotations:
            summary: "Optical Rx power degrading on {{$labels.node}} {{$labels.interface}}"
            description: "Rx power {{ $value | printf \"%.1f\" }} dBm on link {{$labels.link_id}}"

        - alert: SRLInterfaceErrorsHigh
          expr: |
            (rate(synth_in_error_packets_total[1m]) > 50) * on(node, interface)
              group_left(link_id, link_kind) link_membership_info
          for: 1m
          labels:
            severity: warning
            lane: counters
          annotations:
            summary: "Interface error rate climbing on {{$labels.node}} {{$labels.interface}}"
            description: "{{ $value | printf \"%.0f\" }} errors/sec on link {{$labels.link_id}}"
