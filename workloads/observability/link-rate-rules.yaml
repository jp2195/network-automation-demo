apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: link-rate-rules
  labels:
    app.kubernetes.io/name: link-rate-rules
    release: kps
spec:
  groups:
    - name: link-rate
      interval: 30s
      rules:
        - record: link:oper_state_with_meta
          expr: |
            srl_nokia_interfaces_interface_oper_state
              * on(node, interface)
              group_left(link_id, link_kind, corridor, cable_label, provider,
                         restoration_sla_hours, site, city, role)
            link_membership_info
        - record: link:rate_in_bps:1m
          expr: |
            sum by (link_id, link_kind, corridor) (
              rate(srl_nokia_interfaces_interface_statistics_in_octets[1m])
                * on(node, interface)
                group_left(link_id, link_kind, corridor)
              link_membership_info
            ) * 8
        - record: link:rate_out_bps:1m
          expr: |
            sum by (link_id, link_kind, corridor) (
              rate(srl_nokia_interfaces_interface_statistics_out_octets[1m])
                * on(node, interface)
                group_left(link_id, link_kind, corridor)
              link_membership_info
            ) * 8
        - record: link:p95_out_bps:30m
          expr: |
            quantile_over_time(0.95, link:rate_out_bps:1m[30m])
