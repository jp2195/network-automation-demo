subscriptions:
  if-state:
    paths:
      - /interface/oper-state
      - /interface/admin-state
      - /interface/last-change
    mode: stream
    stream-mode: sample
    sample-interval: 5s
  if-counters:
    paths:
      - /interface/statistics/in-octets
      - /interface/statistics/out-octets
      - /interface/statistics/in-unicast-packets
      - /interface/statistics/out-unicast-packets
      - /interface/statistics/in-multicast-packets
      - /interface/statistics/out-multicast-packets
      - /interface/statistics/in-broadcast-packets
      - /interface/statistics/out-broadcast-packets
      - /interface/statistics/in-error-packets
      - /interface/statistics/out-error-packets
      - /interface/statistics/in-discarded-packets
      - /interface/statistics/out-discarded-packets
    mode: stream
    stream-mode: sample
    sample-interval: 10s
  system:
    paths:
      - /platform/control/cpu/total
      - /platform/control/memory
    mode: stream
    stream-mode: sample
    sample-interval: 60s


processors:
  oper-state-to-int:
    event-strings:
      value-names:
        - ".*oper.state.*"
      transforms:
        - replace:
            apply-on: value
            old: up
            new: "1"
        - replace:
            apply-on: value
            old: down
            new: "2"
  admin-state-to-int:
    event-strings:
      value-names:
        - ".*admin.state.*"
      transforms:
        - replace:
            apply-on: value
            old: enable
            new: "1"
        - replace:
            apply-on: value
            old: disable
            new: "0"
  state-cast:
    event-convert:
      values:
        - ".*oper.state.*"
        - ".*admin.state.*"
      type: int

outputs:
  prom:
    type: prometheus
    listen: ":9804"
    event-processors:
      - oper-state-to-int
      - admin-state-to-int
      - state-cast
