apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: maintenance-on
spec:
  serviceAccountName: operate-workflow-sa
  entrypoint: open
  volumes:
    - name: scripts
      configMap:
        name: workflow-scripts
  arguments:
    parameters:
      - name: node
      - name: duration_hours
        value: "2"
      - name: comment
        value: "scheduled maintenance"
  templates:
    - name: open
      inputs:
        parameters:
          - name: node
          - name: duration_hours
          - name: comment
      script:
        image: python:3.12-slim
        command: [python3]
        source: |
          import sys, runpy
          sys.path.insert(0, "/scripts")
          runpy.run_path("/scripts/maintenance_on.py", run_name="__main__")
        volumeMounts:
          - name: scripts
            mountPath: /scripts
        env:
          - name: NODE
            value: "{{inputs.parameters.node}}"
          - name: DURATION_HOURS
            value: "{{inputs.parameters.duration_hours}}"
          - name: COMMENT
            value: "{{inputs.parameters.comment}}"
          - name: ALERTMANAGER_URL
            value: http://kps-kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
          - name: NETBOX_URL
            value: http://netbox.netbox.svc.cluster.local
          - name: NETBOX_TOKEN
            valueFrom:
              secretKeyRef:
                name: netbox-api
                key: token
                optional: true
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits:   {memory: 128Mi}
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: maintenance-off
spec:
  serviceAccountName: operate-workflow-sa
  entrypoint: close
  volumes:
    - name: scripts
      configMap:
        name: workflow-scripts
  arguments:
    parameters:
      - name: node
  templates:
    - name: close
      inputs:
        parameters:
          - name: node
      script:
        image: python:3.12-slim
        command: [python3]
        source: |
          import sys, runpy
          sys.path.insert(0, "/scripts")
          runpy.run_path("/scripts/maintenance_off.py", run_name="__main__")
        volumeMounts:
          - name: scripts
            mountPath: /scripts
        env:
          - name: NODE
            value: "{{inputs.parameters.node}}"
          - name: ALERTMANAGER_URL
            value: http://kps-kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
          - name: NETBOX_URL
            value: http://netbox.netbox.svc.cluster.local
          - name: NETBOX_TOKEN
            valueFrom:
              secretKeyRef:
                name: netbox-api
                key: token
                optional: true
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits:   {memory: 128Mi}
