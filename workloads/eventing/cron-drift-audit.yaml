apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: drift-audit
  annotations:
    # Apply after the WorkflowTemplates: the cron controller validates
    # workflowTemplateRef on creation, and a same-sync race with the
    # WFT informer marks the cron SpecError — which is never
    # re-validated until the resource is touched (smoke-found 2026-06).
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Plural form (v3.6+); the singular `schedule` field was removed in
  # Argo Workflows v4 and is silently ignored / rejected by the CRD.
  schedules:
    - "*/5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  workflowSpec:
    serviceAccountName: operate-workflow-sa
    workflowTemplateRef:
      name: drift-audit
    # 12 runs/hour — GC finished ones so the workflow list stays readable.
    ttlStrategy:
      secondsAfterSuccess: 1800
      secondsAfterFailure: 7200
