apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: ai-analyst
spec:
  template:
    serviceAccountName: operate-workflow-sa
  dependencies:
    - name: alert
      eventSourceName: webhook
      eventName: alert
      filters:
        data:
          # Same alert families as enriched-notify — the advisory lane
          # sees what the deterministic lane sees, in its own Workflow,
          # and can never block it. analyst.py no-ops on resolved events
          # and when the ai-analyst Secret is absent.
          - path: body.alerts.0.labels.alertname
            type: string
            value:
              - SRLInterfaceOperDown
              - SRLInterfaceFlapping
              - SRLOpticalDegrading
              - SRLInterfaceErrorsHigh
              - ConfigDrift
  triggers:
    - template:
        name: ai-analyze
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: ai-analyze-
              spec:
                serviceAccountName: operate-workflow-sa
                workflowTemplateRef:
                  name: ai-analyst
                arguments:
                  parameters:
                    - name: alert
                      value: "placeholder"
          parameters:
            - src:
                dependencyName: alert
                dataKey: body
              dest: spec.arguments.parameters.0.value
