apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo-events

resources:
  - rbac.yaml
  - eventbus.yaml
  - eventsource-webhook.yaml
  - sensor-interface-down.yaml
  - sensor-manual-cut.yaml
  - wft-enriched-notify.yaml
  - wft-cut-fiber.yaml
  - wft-maintenance.yaml
  - wft-incident-collector.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: workflow-scripts
    files:
      - scripts/constants.py
      - scripts/enrich.py
      - scripts/analyze_impact.py
      - scripts/notify.py
      - scripts/incident_bundle.py
