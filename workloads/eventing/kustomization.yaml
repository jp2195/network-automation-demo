apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo-events

resources:
  - rbac.yaml
  - eventbus.yaml
  - eventsource-webhook.yaml
  - sensor-interface-down.yaml
  - sensor-manual-cut.yaml
  - sensor-remediation.yaml
  - cron-drift-audit.yaml
  - wft-enriched-notify.yaml
  - wft-cut-fiber.yaml
  - wft-maintenance.yaml
  - wft-incident-collector.yaml
  - wft-remediation.yaml
  - wft-drift-audit.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: workflow-scripts
    files:
      - scripts/constants.py
      - scripts/netbox_client.py
      - scripts/prom.py
      - scripts/enrich.py
      - scripts/analyze_impact.py
      - scripts/notify.py
      - scripts/incident_bundle.py
      - scripts/maintenance_on.py
      - scripts/maintenance_off.py
      - scripts/identify_targets.py
      - scripts/gather_dom.py
      - scripts/remediate_decide.py
      - scripts/remediate_record.py
      - scripts/drift_compare.py
      - scripts/drift_expected.json
