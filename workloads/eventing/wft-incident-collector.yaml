apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: incident-collector
spec:
  serviceAccountName: operate-workflow-sa
  entrypoint: collect
  arguments:
    parameters:
      - name: alert
  volumes:
    - name: scripts
      configMap:
        name: workflow-scripts
  templates:
    - name: collect
      inputs:
        parameters:
          - name: alert
      dag:
        # The intent: in parallel, gather state from the affected node and
        # the two ring neighbors that share its corridor. failFast: false
        # lets a stranded neighbor not poison the bundle.
        failFast: false
        tasks:
          - name: targets
            template: identify-targets
            arguments:
              parameters:
                - name: alert
                  value: "{{inputs.parameters.alert}}"
          # Both ends of the cut link — most useful forensic context.
          - name: gather-affected
            template: gather-device
            depends: "targets"
            arguments:
              parameters:
                - {name: device,    value: "{{tasks.targets.outputs.parameters.affected}}"}
                - {name: interface, value: "{{tasks.targets.outputs.parameters.interface}}"}
                - {name: role,      value: "affected (cut side)"}
          - name: gather-peer
            template: gather-device
            depends: "targets"
            arguments:
              parameters:
                - {name: device,    value: "{{tasks.targets.outputs.parameters.peer_node}}"}
                - {name: interface, value: "{{tasks.targets.outputs.parameters.peer_interface}}"}
                - {name: role,      value: "link peer (other end of cut)"}
            when: "'{{tasks.targets.outputs.parameters.peer_node}}' != ''"

          # Ring neighbors of the affected device on its *other* backbone
          # links — confirms IS-IS converged around the fault.
          - name: gather-ring-a
            template: gather-device
            depends: "targets"
            arguments:
              parameters:
                - {name: device,    value: "{{tasks.targets.outputs.parameters.ring_a}}"}
                - {name: interface, value: ""}
                - {name: role,      value: "ring neighbor A"}
            when: "'{{tasks.targets.outputs.parameters.ring_a}}' != ''"
          - name: gather-ring-b
            template: gather-device
            depends: "targets"
            arguments:
              parameters:
                - {name: device,    value: "{{tasks.targets.outputs.parameters.ring_b}}"}
                - {name: interface, value: ""}
                - {name: role,      value: "ring neighbor B"}
            when: "'{{tasks.targets.outputs.parameters.ring_b}}' != ''"

          # DOM snapshot from Prometheus for both ends of the cut link.
          - name: gather-dom
            template: gather-dom
            depends: "targets"
            arguments:
              parameters:
                - {name: link_id,        value: "{{tasks.targets.outputs.parameters.link_id}}"}
                - {name: affected,       value: "{{tasks.targets.outputs.parameters.affected}}"}
                - {name: affected_iface, value: "{{tasks.targets.outputs.parameters.interface}}"}
                - {name: peer,           value: "{{tasks.targets.outputs.parameters.peer_node}}"}
                - {name: peer_iface,     value: "{{tasks.targets.outputs.parameters.peer_interface}}"}

          - name: bundle
            template: bundle
            # `when:`-gated tasks reach Skipped (not Omitted) — accept
            # all terminal states so the bundle runs even if peers are
            # absent in this topology.
            depends: >-
              (gather-affected.Succeeded || gather-affected.Failed) &&
              (gather-peer.Succeeded     || gather-peer.Skipped     || gather-peer.Failed) &&
              (gather-ring-a.Succeeded   || gather-ring-a.Skipped   || gather-ring-a.Failed) &&
              (gather-ring-b.Succeeded   || gather-ring-b.Skipped   || gather-ring-b.Failed) &&
              (gather-dom.Succeeded      || gather-dom.Failed)
            arguments:
              parameters:
                - {name: affected,       value: "{{tasks.targets.outputs.parameters.affected}}"}
                - {name: link_id,        value: "{{tasks.targets.outputs.parameters.link_id}}"}
                - {name: affected_report,value: "{{tasks.gather-affected.outputs.result}}"}
                - {name: peer_report,    value: "{{tasks.gather-peer.outputs.result}}"}
                - {name: ring_a_report,  value: "{{tasks.gather-ring-a.outputs.result}}"}
                - {name: ring_b_report,  value: "{{tasks.gather-ring-b.outputs.result}}"}
                - {name: dom_report,     value: "{{tasks.gather-dom.outputs.result}}"}

    # ── identify-targets ────────────────────────────────────────────────
    # Pulls the affected node + interface from the alert payload, then
    # queries Prometheus' link_membership_info to find the two backbone
    # neighbors of the affected device (other backbone link_ids that
    # share this device). Emits 4 parameter outputs.
    - name: identify-targets
      inputs:
        parameters:
          - name: alert
      script:
        image: python:3.12-slim
        command: [python3]
        source: |
          import json, os, sys, urllib.parse, urllib.request

          alert = json.loads(os.environ["ALERT_JSON"])
          a = alert["alerts"][0]
          labels = a["labels"]
          affected   = labels.get("node", "")
          iface      = labels.get("interface", "")
          link_id    = labels.get("link_id", "")
          link_kind  = labels.get("link_kind", "")

          PROM = os.environ["PROM_URL"].rstrip("/")

          def query(q: str):
              url = PROM + "/api/v1/query?query=" + urllib.parse.quote(q)
              with urllib.request.urlopen(url, timeout=10) as r:
                  return json.loads(r.read())["data"]["result"]

          # 1. The PEER end of the cut link — the other (node, interface)
          #    in link_membership_info{link_id=X}. This is the most
          #    important forensic context: the same fiber, opposite side.
          peer_node = ""
          peer_iface = ""
          for row in query(f'link_membership_info{{link_id="{link_id}", node!="{affected}"}}'):
              peer_node = row["metric"].get("node", "")
              peer_iface = row["metric"].get("interface", "")
              break

          # 2. Ring neighbors of the affected device on its *other*
          #    backbone links — useful for confirming IS-IS converged
          #    around the fault.
          ring_neighbors = []
          local_links = {r["metric"]["link_id"]
                         for r in query(
                             f'group by (link_id) '
                             f'(link_membership_info{{node="{affected}", link_kind="backbone"}})')}
          for lid in sorted(local_links):
              if lid == link_id:
                  continue
              for row in query(f'group by (node) '
                               f'(link_membership_info{{link_id="{lid}", node!="{affected}"}})'):
                  ring_neighbors.append(row["metric"]["node"])
          ring_a = ring_neighbors[0] if len(ring_neighbors) > 0 else ""
          ring_b = ring_neighbors[1] if len(ring_neighbors) > 1 else ""

          os.makedirs("/tmp/argo", exist_ok=True)
          for k, v in (("affected", affected), ("interface", iface),
                       ("link_id", link_id),
                       ("peer_node", peer_node), ("peer_interface", peer_iface),
                       ("ring_a", ring_a), ("ring_b", ring_b)):
              with open(f"/tmp/argo/{k}", "w") as f:
                  f.write(v)
          print(f"affected={affected}/{iface} peer={peer_node}/{peer_iface} ring=[{ring_a},{ring_b}] link={link_id}", flush=True)
        env:
          - name: ALERT_JSON
            value: "{{inputs.parameters.alert}}"
          - name: PROM_URL
            value: http://kps-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits:   {memory: 128Mi}
      outputs:
        parameters:
          - name: affected
            valueFrom: {path: /tmp/argo/affected}
          - name: interface
            valueFrom: {path: /tmp/argo/interface}
          - name: link_id
            valueFrom: {path: /tmp/argo/link_id}
          - name: peer_node
            valueFrom: {path: /tmp/argo/peer_node}
          - name: peer_interface
            valueFrom: {path: /tmp/argo/peer_interface}
          - name: ring_a
            valueFrom: {path: /tmp/argo/ring_a}
          - name: ring_b
            valueFrom: {path: /tmp/argo/ring_b}

    # ── gather-device ────────────────────────────────────────────────────
    # gnmic GETs interface state, IS-IS adjacency, and platform load on
    # one device, then formats a short markdown report. Tolerates a dead
    # device (DAG continueOn caught upstream).
    - name: gather-device
      inputs:
        parameters:
          - name: device
          - name: interface
          - name: role
      script:
        image: ghcr.io/openconfig/gnmic:0.44.1
        command: [sh, -c]
        source: |
          set -u
          DEV="{{inputs.parameters.device}}"
          IFC="{{inputs.parameters.interface}}"
          ROLE="{{inputs.parameters.role}}"
          if [ -z "$DEV" ]; then
            printf '## %s — (no device)\n\n_no neighbor at this position._\n' "$ROLE"
            exit 0
          fi
          ADDR="atlanta-${DEV}.clabernetes.svc.cluster.local:57400"
          gnmic_get() {
            timeout 8 gnmic -a "$ADDR" -u admin -p 'NokiaSrl1!' --skip-verify \
              -e json_ietf get --path "$1" 2>/dev/null \
              || echo "[unreachable: $1]"
          }
          IF_PATH="/interface[name=*]/oper-state"
          [ -n "$IFC" ] && IF_PATH="/interface[name=${IFC}]"
          IF_BLOCK=$(gnmic_get "$IF_PATH" | head -200)
          ISIS_BLOCK=$(gnmic_get "/network-instance[name=default]/protocols/srl_nokia-isis:isis/instance[name=atlas]" | head -200)

          printf '## %s — %s%s\n\n' "$ROLE" "$DEV" "${IFC:+ ($IFC)}"
          printf '### interface state\n```json\n%s\n```\n\n' "$IF_BLOCK"
          printf '### isis instance / adjacencies\n```json\n%s\n```\n' "$ISIS_BLOCK"
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits:   {memory: 128Mi}

    # ── gather-dom ───────────────────────────────────────────────────────
    # Pulls the synthetic transceiver readings (temp, Rx/Tx power) for
    # both ends of the cut from Prometheus and formats a markdown table.
    - name: gather-dom
      inputs:
        parameters:
          - name: link_id
          - name: affected
          - name: affected_iface
          - name: peer
          - name: peer_iface
      script:
        image: python:3.12-slim
        command: [python3]
        source: |
          import json, os, sys, urllib.parse, urllib.request

          PROM = os.environ["PROM_URL"].rstrip("/")
          LINK = os.environ["LINK_ID"]

          def query(q: str):
              url = PROM + "/api/v1/query?query=" + urllib.parse.quote(q)
              with urllib.request.urlopen(url, timeout=10) as r:
                  return json.loads(r.read())["data"]["result"]

          def latest(metric: str, link: str) -> dict:
              rows = query(f'{metric}{{link_id="{link}"}}')
              return {(r["metric"]["node"], r["metric"]["interface"]): float(r["value"][1])
                      for r in rows}

          temp  = latest("dom_temperature_celsius",     LINK)
          rxp   = latest("dom_rx_power_dbm",            LINK)
          txp   = latest("dom_tx_power_dbm",            LINK)
          bias  = latest("dom_bias_current_milliamps",  LINK)

          print(f"## DOM snapshot — link {LINK}")
          print()
          print("| End | Node | Interface | Temp (°C) | Rx (dBm) | Tx (dBm) | Bias (mA) |")
          print("|-----|------|-----------|-----------|----------|----------|-----------|")
          for (end, n, i) in [
              ("affected",  os.environ["AFFECTED"],  os.environ["AFFECTED_IFACE"]),
              ("peer",      os.environ["PEER"],      os.environ["PEER_IFACE"]),
          ]:
              if not n or not i:
                  continue
              t  = temp.get((n, i), float('nan'))
              rx = rxp.get((n, i), float('nan'))
              tx = txp.get((n, i), float('nan'))
              ba = bias.get((n, i), float('nan'))
              print(f"| {end} | {n} | {i} | {t:.2f} | {rx:.2f} | {tx:.2f} | {ba:.2f} |")
        env:
          - name: PROM_URL
            value: http://kps-kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          - name: LINK_ID
            value: "{{inputs.parameters.link_id}}"
          - name: AFFECTED
            value: "{{inputs.parameters.affected}}"
          - name: AFFECTED_IFACE
            value: "{{inputs.parameters.affected_iface}}"
          - name: PEER
            value: "{{inputs.parameters.peer}}"
          - name: PEER_IFACE
            value: "{{inputs.parameters.peer_iface}}"
        resources:
          requests: {cpu: 30m, memory: 48Mi}
          limits:   {memory: 96Mi}

    # ── bundle ───────────────────────────────────────────────────────────
    # Stitches the per-device reports together with header, posts to
    # Slack as a thread reply on the existing incident message (looks up
    # the ledger entry in Valkey by alert fingerprint), or short-circuits
    # to stderr.
    - name: bundle
      inputs:
        parameters:
          - name: affected
          - name: link_id
          - name: affected_report
          - name: peer_report
          - name: ring_a_report
          - name: ring_b_report
          - name: dom_report
      script:
        image: python:3.12-slim
        command: [python3]
        source: |
          import os, subprocess, sys, runpy
          # slack-sdk + valkey are only needed if Slack is wired up; if
          # they fail to install, notify_bundle.py degrades to stderr.
          with open(os.devnull, "w") as devnull:
              try:
                  subprocess.check_call(
                      [sys.executable, "-m", "pip", "install", "--quiet",
                       "--no-cache-dir", "slack-sdk", "valkey"],
                      stdout=devnull,
                  )
              except Exception as e:
                  print(f"pip install failed (degrading to stderr): {e}",
                        file=sys.stderr, flush=True)
          runpy.run_path("/scripts/incident_bundle.py", run_name="__main__")
        env:
          - name: AFFECTED
            value: "{{inputs.parameters.affected}}"
          - name: LINK_ID
            value: "{{inputs.parameters.link_id}}"
          - name: REPORT_AFFECTED
            value: "{{inputs.parameters.affected_report}}"
          - name: REPORT_PEER
            value: "{{inputs.parameters.peer_report}}"
          - name: REPORT_RING_A
            value: "{{inputs.parameters.ring_a_report}}"
          - name: REPORT_RING_B
            value: "{{inputs.parameters.ring_b_report}}"
          - name: REPORT_DOM
            value: "{{inputs.parameters.dom_report}}"
          - name: SLACK_BOT_TOKEN
            valueFrom:
              secretKeyRef:
                name: slack-bot
                key: bot_token
                optional: true
          - name: SLACK_CHANNEL_ID
            valueFrom:
              secretKeyRef:
                name: slack-bot
                key: channel_id
                optional: true
          - name: VALKEY_URL
            value: valkey://valkey.valkey.svc.cluster.local:6379/2
        volumeMounts:
          - name: scripts
            mountPath: /scripts
        resources:
          requests: {cpu: 50m, memory: 96Mi}
          limits:   {memory: 192Mi}
