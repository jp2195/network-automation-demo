apiVersion: v1
kind: Secret
metadata:
  name: slack-bot
type: Opaque
stringData:
  # Replace with a real Slack bot token (xoxb-...) for a Slack app with
  # `chat:write` scope installed to your workspace.
  bot_token: "xoxb-PLACEHOLDER-PLACEHOLDER-PLACEHOLDER"
  # Channel ID (not name) — copy from the channel's "About" panel.
  channel_id: "C0PLACEHOLDER"
