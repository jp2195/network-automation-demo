apiVersion: v1
kind: ServiceAccount
metadata:
  name: operate-workflow-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operate-workflow
rules:
  - apiGroups: ["argoproj.io"]
    resources:
      - workflows
      - workflows/finalizers
      - workflowtemplates
      - workflowtemplates/finalizers
      - workflowtaskresults
      - workflowtasksets
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods, pods/log, configmaps, secrets]
    verbs: [get, list, watch, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: operate-workflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: operate-workflow
subjects:
  - kind: ServiceAccount
    name: operate-workflow-sa
---
# Lets the netbox-seed Job (in the netbox namespace) write the
# argo-events/netbox-api Secret it provisions a fresh NetBox API token
# into. Scoped to that one Secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: netbox-seed-token-publisher
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["netbox-api"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: netbox-seed-token-publisher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: netbox-seed-token-publisher
subjects:
  - kind: ServiceAccount
    name: netbox-seed
    namespace: netbox
