apiVersion: apps/v1
kind: Deployment
metadata:
  name: dom-synth
  labels:
    app.kubernetes.io/name: dom-synth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dom-synth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dom-synth
    spec:
      containers:
        - name: dom-synth
          image: atlas-demo-registry:5001/dom-synth:latest
          # Image's CMD already runs python3 /app/dom_synth.py.
          # The /app mount from the ConfigMap overrides the baked copy
          # at runtime so script iteration doesn't require a rebuild.
          env:
            - name: LINKS_FILE
              value: /data/links.json
            - name: PORT
              value: "8000"
            - name: VALKEY_URL
              value: valkey://valkey.valkey.svc.cluster.local:6379/3
          ports:
            - name: prom
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: prom
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: app
              mountPath: /app
            - name: data
              mountPath: /data
      volumes:
        - name: app
          configMap:
            name: dom-synth-script
        - name: data
          configMap:
            name: dom-synth-links
