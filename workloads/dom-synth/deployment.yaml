apiVersion: apps/v1
kind: Deployment
metadata:
  name: dom-synth
  labels:
    app.kubernetes.io/name: dom-synth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dom-synth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dom-synth
    spec:
      containers:
        - name: dom-synth
          image: python:3.12-slim
          command: ["python3", "/app/dom_synth.py"]
          env:
            - name: LINKS_FILE
              value: /data/links.json
            - name: PORT
              value: "8000"
          ports:
            - name: prom
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: prom
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: app
              mountPath: /app
            - name: data
              mountPath: /data
      volumes:
        - name: app
          configMap:
            name: dom-synth-script
        - name: data
          configMap:
            name: dom-synth-links
