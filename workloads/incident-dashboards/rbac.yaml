# Lets the eventing pipeline (operate-workflow-sa in argo-events) manage
# per-incident Grafana dashboard ConfigMaps in THIS namespace only.
# create+delete cannot be name-scoped in RBAC (create has no name yet;
# delete by resourceNames would block create), so the grant is blanket on
# configmaps — but this namespace holds nothing else, so the blast radius
# is exactly the incident dashboards. No get/list/watch: the lane writes
# by known name and never enumerates.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: incident-dashboards
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: incident-dashboards
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: incident-dashboards
subjects:
  - kind: ServiceAccount
    name: operate-workflow-sa
    namespace: argo-events
