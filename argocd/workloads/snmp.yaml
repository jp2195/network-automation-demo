apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snmp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jp2195/network-automation-demo.git
    targetRevision: main
    path: workloads/snmp
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    # The Prometheus operator stores the implicit `action: replace` default
    # explicitly on every relabelingConfig.
    - group: monitoring.coreos.com
      kind: Probe
      jqPathExpressions:
        - .spec.targets.staticConfig.relabelingConfigs[].action
