apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: atlas-demo
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=zero"]
  generators:
    - git:
        repoURL: https://github.com/jp2195/network-automation-demo.git
        revision: main
        files:
          - path: argocd/manifests/platform/*.yaml
          - path: argocd/manifests/workloads/*.yaml
  # Minimal structured template: just the always-required fields. The
  # conditional logic (chart vs path source, ignoreDifferences, manual-
  # sync override for dom-synth) lives in templatePatch below — that's
  # the only way to do structural conditionals in an ApplicationSet,
  # because `spec.template` must be valid YAML BEFORE Go-template
  # rendering.
  template:
    metadata:
      name: '{{ .name }}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ .namespace }}'
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
  templatePatch: |
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
    spec:
      {{- if .chart }}
      sources:
        - repoURL: '{{ .chart.repo }}'
          {{- if .chart.fromGit }}
          targetRevision: '{{ .chart.version }}'
          path: '{{ .chart.name }}'
          {{- else }}
          chart: '{{ .chart.name }}'
          targetRevision: '{{ .chart.version }}'
          {{- end }}
          helm:
            releaseName: '{{ .chart.releaseName }}'
            valueFiles:
              - '$values/{{ .chart.values }}'
            {{- if hasKey .chart "skipCrds" }}
            skipCrds: {{ .chart.skipCrds }}
            {{- end }}
        - repoURL: https://github.com/jp2195/network-automation-demo.git
          targetRevision: main
          ref: values
      {{- else }}
      source:
        repoURL: https://github.com/jp2195/network-automation-demo.git
        targetRevision: main
        path: '{{ .path }}'
      {{- end }}
      {{- if ne .automated false }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      {{- end }}
      {{- if .ignoreDifferences }}
      ignoreDifferences:
        {{- range .ignoreDifferences }}
        - group: '{{ .group }}'
          kind: '{{ .kind }}'
          {{- if .jqPathExpressions }}
          jqPathExpressions:
            {{- range .jqPathExpressions }}
            - {{ . | toYaml }}
            {{- end }}
          {{- end }}
          {{- if .jsonPointers }}
          jsonPointers:
            {{- range .jsonPointers }}
            - {{ . | toYaml }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
